# config/domain_whitelist.yaml
# ─────────────────────────────────────────────────────────────────────
# Liste blanche des domaines autorisés pour l'agent web D3.
#
# Tout résultat retourné par Brave Search dont l'URL ne match aucun de
# ces domaines est silencieusement filtré.
#
# CATÉGORIES & PICTOGRAMMES
#   📰 presse          : quotidiens régionaux + nationaux culture
#   📅 agenda_local    : médias culturels spécialisés (ligne édito assumée)
#   🏛️  institutionnel  : mairies, offices de tourisme, agences culturelles
#   🎫 billetterie     : billetteries officielles
#   🎭 lieu_culturel   : scènes / opéras / lieux emblématiques par ville
#
# PRIORISATION (champ priority, croissante : 1 = top)
#   1 : presse régionale, agenda local, lieu emblématique, billetterie officielle
#   2 : institutionnel (souvent moins riche en actualité événementielle)
#
# COUVERTURE
#   Top-8 villes du périmètre Puls-Events :
#   Paris, Lyon, Marseille, Toulouse, Nantes, Bordeaux, Lille, Strasbourg
#
# MAINTENANCE
#   Pour ajouter/retirer un domaine : modifier ce fichier et redémarrer
#   l'app. Aucun rebuild Docker nécessaire.
#
# FILTRAGE DOMAINE-BASED
#   Le matcher whitelist opère sur le domaine (netloc), pas sur l'URL
#   complète. Conséquence : `ouest-france.fr` capture automatiquement
#   `ouest-france.fr/presse-ocean/`, `ouest-france.fr/loire-atlantique/`,
#   etc. Pas besoin de dupliquer les sous-rubriques.
#
# ANTI-PATTERNS ÉVITÉS
#   - Pas de wildcards "*.fr" qui laisseraient passer n'importe quoi
#   - Pas de réseaux sociaux (Twitter/X, Facebook) — qualité éditoriale
#     trop variable, risque de faux billets ou de désinformation
#   - Pas de quotidiens nationaux généralistes (Le Monde, Le Parisien) :
#     trop de bruit (politique, faits divers) pour un agent culturel
#
# Réf. backlog : US-603 (whitelist domaines), R-09 (dépendance smolagents),
#                US-701 (extension multi-villes — élargissement post-MVP)
# ─────────────────────────────────────────────────────────────────────

domains:

  # ═══════════════════════════════════════════════════════════════════
  # PRESSE RÉGIONALE
  # ═══════════════════════════════════════════════════════════════════

  - domain: ouest-france.fr
    category: presse
    icon: "📰"
    priority: 1
    # Couvre Nantes + Loire-Atlantique + sous-rubrique Presse Océan
    # (le filtre domaine-based capture tous les sous-chemins)

  - domain: presse-ocean.fr
    category: presse
    icon: "📰"
    priority: 1

  - domain: nantes.maville.com
    category: presse
    icon: "📰"
    priority: 2

  # ═══════════════════════════════════════════════════════════════════
  # AGENDA LOCAL — médias culturels spécialisés
  # ═══════════════════════════════════════════════════════════════════

  # ─── Transverse (national, sous-domaines départementaux) ──
  - domain: agendaculturel.fr
    category: agenda_local
    icon: "📅"
    priority: 1
    # Agenda culturel national à sous-domaines départementaux
    # (38.agendaculturel.fr, 31., 75., 13.…). Le matcher domaine-based
    # capture automatiquement tous les départements. Mesure empirique
    # (tests/check + diagnostic Brave) : remonté sur 4/4 requêtes test,
    # couvre toutes les villes hors top-8 curaté (Vienne, Aix…).

  # ─── Paris ─────────────────────────────────────────────
  - domain: lylo.fr
    category: agenda_local
    icon: "📅"
    priority: 1
    # Bible des concerts et spectacles à Paris

  - domain: offi.fr
    category: agenda_local
    icon: "📅"
    priority: 1
    # Agenda culturel parisien complémentaire de Lylo

